services:
  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "${VOICE_HTTP_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    image: mfc-voice-web:latest
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      VOICE_RECORDINGS_DIR: /data/recordings
      VOICE_ARTIFACTS_DIR: /data/reports
      VOICE_ASR_URL: http://asr-api:8100
      VOICE_DIARIZATION_URL: http://diarization-api:8100
      VOICE_EMOTION_URL: http://emotion-api:8100
      VOICE_RABBITMQ_URL: amqp://guest:guest@rabbitmq/
      VOICE_RABBITMQ_QUEUE: ${VOICE_RABBITMQ_QUEUE:-voice.recordings}
      VOICE_CONTAINER_RECORDINGS_DIR: /data/recordings
      VOICE_QWEN_BASE_URL: ${VOICE_QWEN_BASE_URL:-http://host.docker.internal:8000/v1}
      VOICE_QWEN_MODEL: ${VOICE_QWEN_MODEL:-qwen3.6-35b}
    volumes:
      - ./.recordings:/data/recordings
      - ./.reports:/data/reports
    expose:
      - "8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      rabbitmq:
        condition: service_healthy
      asr-api:
        condition: service_healthy
      diarization-api:
        condition: service_healthy
      emotion-api:
        condition: service_healthy

  qwen-api:
    image: vllm/vllm-openai:${VOICE_QWEN_VLLM_TAG:-latest}
    profiles:
      - qwen
    restart: unless-stopped
    ipc: host
    shm_size: "16gb"
    env_file:
      - path: .env
        required: false
    environment:
      HF_HOME: /models/huggingface
      HUGGINGFACE_HUB_CACHE: /models/huggingface/hub
      HF_HUB_ENABLE_HF_TRANSFER: "0"
      HF_HUB_DISABLE_XET: "1"
      NVIDIA_VISIBLE_DEVICES: "${QWEN_NVIDIA_VISIBLE_DEVICES:-0,1}"
      NCCL_P2P_DISABLE: "1"
      VLLM_LOGGING_LEVEL: ${VOICE_QWEN_LOGGING_LEVEL:-INFO}
    volumes:
      - ${VOICE_QWEN_HF_CACHE:-./model-cache/huggingface}:/root/.cache/huggingface
    expose:
      - "8000"
    command:
      - --model
      - ${VOICE_QWEN_MODEL_ID:-cyankiwi/Qwen3.6-35B-A3B-AWQ-4bit}
      - --served-model-name
      - ${VOICE_QWEN_MODEL:-qwen3.6-35b}
      - --tensor-parallel-size
      - "${VOICE_QWEN_TENSOR_PARALLEL_SIZE:-2}"
      - --gpu-memory-utilization
      - "${VOICE_QWEN_GPU_MEMORY_UTILIZATION:-0.85}"
      - --max-model-len
      - "${VOICE_QWEN_MAX_MODEL_LEN:-65536}"
      - --dtype
      - auto
      - --trust-remote-code
      - --reasoning-parser
      - qwen3
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 120
      start_period: 60s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0", "1"]
              capabilities: [gpu]

  rabbitmq:
    image: rabbitmq:3.13-management
    restart: unless-stopped
    expose:
      - "5672"
      - "15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  asr-api:
    build:
      context: ./docker/voice-model-api
    image: mfc-voice-model-api:latest
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      MODEL_SERVICE: asr
      MODEL_DEVICE: ${MODEL_DEVICE:-cuda}
      ASR_MODEL: ${ASR_MODEL:-deepdml/faster-whisper-large-v3-turbo-ct2}
      NVIDIA_VISIBLE_DEVICES: "${ASR_NVIDIA_VISIBLE_DEVICES:-${NVIDIA_VISIBLE_DEVICES:-0}}"
      HF_HOME: /models/huggingface
      HUGGINGFACE_HUB_CACHE: /models/huggingface/hub
      HF_HUB_ENABLE_HF_TRANSFER: "0"
      HF_HUB_DISABLE_XET: "1"
    volumes:
      - ./.recordings:/data/recordings:ro
      - ./model-cache:/models
    expose:
      - "8100"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  diarization-api:
    image: mfc-voice-model-api:latest
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      MODEL_SERVICE: diarization
      MODEL_DEVICE: ${MODEL_DEVICE:-cuda}
      DIARIZATION_MODEL: ${DIARIZATION_MODEL:-pyannote/speaker-diarization-community-1}
      NVIDIA_VISIBLE_DEVICES: "${DIARIZATION_NVIDIA_VISIBLE_DEVICES:-${NVIDIA_VISIBLE_DEVICES:-0}}"
      HF_HOME: /models/huggingface
      HUGGINGFACE_HUB_CACHE: /models/huggingface/hub
      HF_HUB_ENABLE_HF_TRANSFER: "0"
      HF_HUB_DISABLE_XET: "1"
    volumes:
      - ./.recordings:/data/recordings:ro
      - ./model-cache:/models
    expose:
      - "8100"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  emotion-api:
    image: mfc-voice-model-api:latest
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      MODEL_SERVICE: emotion
      MODEL_DEVICE: ${MODEL_DEVICE:-cuda}
      SER_MODEL: ${SER_MODEL:-xbgoose/hubert-large-speech-emotion-recognition-russian-dusha-finetuned}
      NVIDIA_VISIBLE_DEVICES: "${EMOTION_NVIDIA_VISIBLE_DEVICES:-${NVIDIA_VISIBLE_DEVICES:-0}}"
      HF_HOME: /models/huggingface
      HUGGINGFACE_HUB_CACHE: /models/huggingface/hub
      HF_HUB_ENABLE_HF_TRANSFER: "0"
      HF_HUB_DISABLE_XET: "1"
    volumes:
      - ./.recordings:/data/recordings:ro
      - ./model-cache:/models
    expose:
      - "8100"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
