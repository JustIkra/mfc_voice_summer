services:
  rabbitmq:
    image: rabbitmq:3.13-management
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  asr-api:
    build:
      context: ./docker/voice-model-api
    image: mfc-voice-model-api:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MODEL_SERVICE: asr
      MODEL_DEVICE: cuda
      ASR_MODEL: deepdml/faster-whisper-large-v3-turbo-ct2
      NVIDIA_VISIBLE_DEVICES: "0"
      HF_HOME: /models/huggingface
      HUGGINGFACE_HUB_CACHE: /models/huggingface/hub
      HF_HUB_ENABLE_HF_TRANSFER: "0"
      HF_HUB_DISABLE_XET: "1"
    volumes:
      - ./.recordings:/data/recordings:ro
      - ./model-cache:/models
    ports:
      - "8101:8100"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  diarization-api:
    image: mfc-voice-model-api:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MODEL_SERVICE: diarization
      MODEL_DEVICE: cuda
      DIARIZATION_MODEL: pyannote/speaker-diarization-community-1
      NVIDIA_VISIBLE_DEVICES: "0"
      HF_HOME: /models/huggingface
      HUGGINGFACE_HUB_CACHE: /models/huggingface/hub
      HF_HUB_ENABLE_HF_TRANSFER: "0"
      HF_HUB_DISABLE_XET: "1"
    volumes:
      - ./.recordings:/data/recordings:ro
      - ./model-cache:/models
    ports:
      - "8102:8100"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  emotion-api:
    image: mfc-voice-model-api:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MODEL_SERVICE: emotion
      MODEL_DEVICE: cuda
      SER_MODEL: xbgoose/hubert-large-speech-emotion-recognition-russian-dusha-finetuned
      NVIDIA_VISIBLE_DEVICES: "0"
      HF_HOME: /models/huggingface
      HUGGINGFACE_HUB_CACHE: /models/huggingface/hub
      HF_HUB_ENABLE_HF_TRANSFER: "0"
      HF_HUB_DISABLE_XET: "1"
    volumes:
      - ./.recordings:/data/recordings:ro
      - ./model-cache:/models
    ports:
      - "8103:8100"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
